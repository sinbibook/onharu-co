<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>가평 온하루펜션 - 객실안내</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/room.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="가평 온하루펜션 - 객실안내" />
  <meta property="og:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/14/Ca3FLqU6l0ck.jpg" />
  <meta property="og:url" content="https://onharu.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="가평 온하루펜션 - 객실안내" />
  <meta name="twitter:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/14/Ca3FLqU6l0ck.jpg" />
  <meta name="naver-site-verification" content="6b6587aff8daa6a92df6de541c93c03680ade771" />
  <meta name="google-site-verification" content="480zXtoyD-AnRtdijO7i5gGH2c3I0eZfD-N8fpnwxw8" />
</head>
  <body>
    <div class="wrapper">
<div class="container">
        <!-- MAPPER: property.rooms[current].images[0].interior[isSelected] + name -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper"></div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_arrow_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_arrow_right_1.png" alt="" />
              </div>
            </div>
          </div>
          <div class="tx1"></div>
        </div>

        <!-- MAPPER: property.rooms[] (layout-map + active rooms) -->
        <div id="snb_wrap">
          <ul data-room-nav-list>
            <li class="active"><a href="layout-map.html">미리보기</a></li>
          </ul>
        </div>
        <!-- MAPPER: property.rooms[current] (name, description, bedTypes, roomStructures, usageGuide, images[0].thumbnail[0], images[0].interior[0]) -->
        <div class="con6 w1440">
          <div class="item">
            <div class="left" data-aos="fade-up">
              <div class="img">
                <img alt="" />
              </div>
            </div>
            <div class="right" data-aos="fade-up">
              <div class="tx1">ROOMS</div>
              <div class="tx2"></div>
              <div class="tx3"></div>
              <div class="tx1">NOTICE</div>
              <div class="tx4">※ 자세한 내용은 이용안내 페이지 참고 부탁드립니다.</div>
              <div class="img">
                <img alt="" />
                <div class="tx5">
                  LET'S ENJOY A FREE AND FUN DAY HERE,<br />
                  WHICH IS SPACIOUS
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: property.rooms[current] (name, size, roomStructures, baseOccupancy, maxOccupancy) -->
        <div class="con8 w1440" data-aos="fade-up">
          <!-- PC 버전 -->
          <div class="price_table for_pc">
            <table cellspacing="0" cellpadding="0" class="table_default">
              <thead>
                <tr>
                  <th style="width: 15%;">객실명</th>
                  <th style="width: 5%;">기준</th>
                  <th style="width: 5%;">최대</th>
                  <th style="width: 20%;">유형</th>
                  <th style="width: 20%;">평형</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
            <!-- MAPPER: rooms[current].amenities (집기품목) -->
            <ul class="table_text">
              <li>
                <strong>집기품목</strong> :
                <span data-room-amenities></span>
              </li>
            </ul>
          </div>
        </div>
        <!-- MAPPER: rooms[current].images[0].exterior[0,1,2] -->
        <div class="con7">
          <div class="w1440">
            <div
              class="img"
              data-aos="fade-up"
              data-aos-delay="400"
            ></div>
            <div class="center" data-aos="fade-up">
              <div class="tx1 travelFont">I support your beautiful trip</div>
              <!-- tx2: 하드코딩 유지 -->
              <div class="tx2">
                특별한 장소가 주는 특별한 하루<br />
                이곳에서 최상의 휴식을 경험하세요.
              </div>
              <div class="img"></div>
            </div>
            <div
              class="img"
              data-aos="fade-up"
              data-aos-delay="900"
            ></div>
          </div>
        </div>
        <!-- MAPPER: rooms[] (excluding current - thumbnail + name) -->
        <div class="con3">
          <div class="w1440">
            <div class="conTitle" data-aos="fade-up">
              <div class="subTitle">
              </div>
              <div class="title">
              </div>
            </div>
            <div class="swiper-container" data-aos="fade-up">
              <div class="swiper-wrapper"></div>
              <div class="swiperNavi">
                <div class="swiper-button-prev">
                  <img src="images/icon_arrow_left_2.png" alt="" />
                </div>
                <div class="bar"></div>
                <div class="swiper-button-next">
                  <img src="images/icon_arrow_right_2.png" alt="" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@beta/bundled/locomotive-scroll.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/core/base-mapper.js"></script>
  <script src="js/data-mapper/pages/room-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
</html>
