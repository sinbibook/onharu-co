<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>가평 온하루펜션</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nearby-attractions.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="가평 온하루펜션" />
  <meta property="og:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  
  <meta property="og:url" content="https://onharu.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="가평 온하루펜션" />
  <meta name="twitter:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  
</head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.nearbyAttractions.sections[0].hero.images[isSelected] -->
        <div class="con0 height img" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper" data-nearby-attractions-hero-slides></div>
          </div>
        </div>

        <div class="con12" data-aos="fade-up">
          <div class="tx0">
            <span class="travelFont">Travel</span>
            <span class="tx0_1">여행안내</span>
          </div>
        </div>

        <!-- MAPPER: customFields.pages.nearbyAttractions.sections[0].hero (title, description) -->
        <div class="con12" data-aos="fade-up" style="padding-top: 0;">
          <div class="tx1" data-nearby-attractions-hero-title></div>
          <div class="tx2" data-nearby-attractions-hero-description></div>
        </div>

        <!-- MAPPER: customFields.pages.nearbyAttractions.sections[0].about[] (title, distance, description, image) -->
        <div class="con11">
          <div class="w1440" data-nearby-attractions-items></div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@beta/bundled/locomotive-scroll.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/core/base-mapper.js"></script>
  <script src="js/data-mapper/pages/nearby-attractions-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
  <script src="js/pages/nearby-attractions.js"></script>
</html>
