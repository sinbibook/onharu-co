<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>가평 온하루펜션</title>
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <style>
      html, body { height: 100%; }
      body {
        display: flex;
        flex-direction: column;
        background-color: var(--color-primary);
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .errorContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 300px 20px 100px;
        text-align: center;
      }
      .errorCode {
        font-size: 120px;
        font-weight: 900;
        color: var(--color-secondary);
        line-height: 1;
        margin-bottom: 20px;
        letter-spacing: -4px;
      }
      .errorTitle {
        font-family: var(--font-ko-main);
        font-size: 28px;
        font-weight: 700;
        color: #333;
        margin-bottom: 15px;
      }
      .errorMessage {
        font-size: 16px;
        color: #666;
        margin-bottom: 50px;
        line-height: 1.8;
        max-width: 480px;
      }
      .errorContainer .btnReservation {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 250px;
        height: 55px;
        border: 2px solid var(--color-secondary);
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background-color: var(--color-secondary);
        text-decoration: none;
        transition: all 0.3s ease;
        padding: 0;
      }
      @media (max-width: 1440px) {
        .errorCode { font-size: 80px; }
        .errorTitle { font-size: 22px; }
        .errorMessage { font-size: 14px; }
        .errorContainer { padding: 300px 20px 80px; }
        .errorContainer .btnReservation {
          width: 140px;
          height: 40px;
          font-size: 14px;
        }
      }
    </style>
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="가평 온하루펜션" />
  <meta property="og:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/14/Ca3FLqU6l0ck.jpg" />
  <meta property="og:url" content="https://onharu.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="가평 온하루펜션" />
  <meta name="twitter:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/14/Ca3FLqU6l0ck.jpg" />
</head>
  <body>
    <div class="wrapper">
      <main>
        <div class="errorContainer">
          <div class="errorCode">404</div>
          <h1 class="errorTitle">페이지를 찾을 수 없습니다.</h1>
          <p class="errorMessage">
            요청하신 페이지가 존재하지 않거나 비활성화되었습니다.<br />
            홈으로 돌아가기 버튼을 클릭해주세요.
          </p>
          <a href="index.html" class="btnReservation">홈으로 돌아가기</a>
        </div>
      </main>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
