<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>가평 온하루펜션 - 숙소소개</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/main.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="가평 온하루펜션 - 숙소소개" />
  <meta property="og:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  
  <meta property="og:url" content="https://onharu.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="가평 온하루펜션 - 숙소소개" />
  <meta name="twitter:description" content="탁 트인 가평의 풍경과 맑은 계곡, 프라이빗 바베큐가 어우러진 공간에서 사랑하는 사람들과 여유롭고 특별한 하루를 완성해 보세요." />
  
</head>
  <body>
    <div class="wrapper">
<div class="container">
        <!-- MAPPER: customFields.pages.main.hero.images[isSelected] -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper">
            </div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_arrow_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_arrow_right_1.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: property.nameEn + property.images[0].exterior[isSelected].url -->
        <div class="con1">
          <div class="img">
            <img alt="" data-aos="fade-up" />
            <div class="tx travelFont"></div>
          </div>
        </div>
        <!-- MAPPER: customFields.pages.main.about (title + images rolling) -->
        <div class="con2">
          <div class="conTitle" data-aos="fade-up">
            <div class="subTitle">
            </div>
            <div class="title"></div>
          </div>
          <!-- MAPPER: about[].images rolling -->
          <div class="imgRolling">
          </div>
        </div>
        <!-- MAPPER: property.surrounding[0].images[isSelected] -->
        <div class="con5">
          <div class="img" data-aos="fade-up"></div>
          <div class="w1440">
            <div class="tx travelFont" data-aos="fade-up">
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@beta/bundled/locomotive-scroll.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/core/base-mapper.js"></script>
  <script src="js/data-mapper/pages/main-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
</html>
